server {
    listen 80;
    listen [::]:80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 169.254.169.253 valid=10s ipv6=off;

    # Set variable at server level - fixes uninitialized variable error
    set $supabase_host "wsbnlafqcvqizlhaeffb.supabase.co";

    location /supabase/ {
        rewrite ^/supabase/(.*) /$1 break;
        proxy_pass https://$supabase_host;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host $supabase_host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, apikey, Authorization, Prefer" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location / {
        try_files $uri /index.html;
    }
}
