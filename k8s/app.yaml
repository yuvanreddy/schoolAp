---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-demo
  namespace: production
  labels:
    app: school-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-demo
  template:
    metadata:
      labels:
        app: school-demo
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: school-demo
          image: 816069153839.dkr.ecr.ap-south-1.amazonaws.com/edusphere-school-app:v1.0.0
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: school-demo
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: school-demo
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: school-demo
  namespace: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: school-demo
                port:
                  number: 80
