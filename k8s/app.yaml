apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: school-demo
  namespace: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:816069153839:certificate/cb1a365c-88bf-45d0-a46f-0ec6626c14c1
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: school-demo
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: school-demo
  namespace: production
spec:
  selector:
    app: school-demo
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-demo
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: school-demo
  template:
    metadata:
      labels:
        app: school-demo
    spec:
      containers:
      - name: school-demo
        image: 816069153839.dkr.ecr.ap-south-1.amazonaws.com/edusphere-school-app:v4.7.0
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      imagePullSecrets:
      - name: ecr-secret
